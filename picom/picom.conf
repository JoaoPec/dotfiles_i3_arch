#################################
# BACKEND
#################################
backend = "glx";
vsync = true;

#################################
# CORNERS / ROUNDED
#################################
corner-radius = 10;

#################################
# SHADOWS (bem leve)
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.25;

shadow-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'Polybar'"
];

#################################
# FADING (animações suaves)
#################################
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

#################################
# TRANSPARÊNCIA (bem controlada)
#################################
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 0.9;

inactive-opacity-override = false;

opacity-rule = [
  "90:class_g = 'Rofi'",
  "85:class_g = 'Alacritty'"
];

# GAPS



#################################
# BLUR (glass effect leve)
#################################
blur: {
  method = "dual_kawase";
  strength = 6;
};

blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

#################################
# EXCLUSÕES IMPORTANTES
#################################
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

rounded-corners-exclude = [
    "class_g = 'i3bar'"
];



#################################
# PERFORMANCE
#################################
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;

